<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Border BI · Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #080808;
    --bg2: #0f0f0f;
    --border: #222;
    --text: #ffffff;
    --dim: #8a8a8a;
    --accent: #c8b89a;
    --red: #c0392b;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .login-container {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 40px;
    border-radius: 4px;
    width: 100%;
    max-width: 380px;
  }

  .login-header {
    margin-bottom: 32px;
    text-align: center;
  }

  .login-title {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  .login-sub {
    font-size: 12px;
    color: var(--dim);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  .form-group {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    padding: 10px 12px;
    background: #141414;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    border-radius: 3px;
  }

  input:focus {
    outline: none;
    border-color: var(--accent);
    background: #1a1a1a;
  }

  button {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    border-radius: 3px;
    margin-top: 12px;
  }

  button:hover {
    opacity: 0.9;
  }

  button:active {
    opacity: 0.8;
  }

  .error {
    color: var(--red);
    font-size: 12px;
    margin-top: 12px;
    text-align: center;
    display: none;
  }

  .error.show {
    display: block;
  }
</style>
</head>
<body>

<div class="login-container">
  <div class="login-header">
    <div class="login-title">Border</div>
    <div class="login-sub">BI · Análise Estratégica</div>
  </div>

  <form id="login-form" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label for="username">Usuário</label>
      <input type="text" id="username" placeholder="border" required autofocus>
    </div>

    <div class="form-group">
      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="••••••••" required>
    </div>

    <button type="submit">Entrar</button>

    <div class="error" id="error-msg">Usuário ou senha incorretos</div>
  </form>
</div>

<script>
  // Verifica se já está autenticado
  function checkAuth() {
    const auth = sessionStorage.getItem('border_auth');
    if (auth === 'true') {
      window.location.href = 'index.html';
    }
  }

  function handleLogin(event) {
    event.preventDefault();

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('error-msg');

    // Credenciais corretas
    if (username === 'border' && password === 'soeusei2026!') {
      sessionStorage.setItem('border_auth', 'true');
      window.location.href = 'index.html';
    } else {
      errorMsg.classList.add('show');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  }

  // Verifica autenticação ao carregar
  checkAuth();
</script>

</body>
</html>
